<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../popup.css">
</head>
<body>
    <div id="list-view">
        <header>
            <button id="back-button" class="menu-btn" title="Voltar">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Prompts</h1>
        </header>
        <main id="prompts-container">
            <!-- Content for prompts will go here -->
        </main>
    </div>

    <div id="prompt-view" style="display: none;">
        <header>
            <button id="prompt-back-button" class="menu-btn" title="Voltar">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 id="prompt-title"></h1>
        </header>
        <main>
            <textarea id="prompt-textarea" class="prompt-textarea"></textarea>
            <button id="copy-prompt-button" class="btn">Copiar</button>
        </main>
    </div>

    <script src="prompts.js"></script>
</body>
</html>
